<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uke Tuner</title>
<style>
body{margin:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.wrap{position:relative;width:100vw;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#cBg{z-index:0}
#c{image-rendering:pixelated;image-rendering:crisp-edges;z-index:1}
#c2{z-index:2}
#headstock-img{
  position:absolute;
  z-index:3;
  box-sizing:border-box;
  pointer-events:none;
  object-fit:contain;
}
#startBtn{
  position:absolute;
  z-index:10;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:none;
  border:1px solid #5C4A1E;
  color:#E8750A;
  font-family:'Courier New',monospace;
  font-size:14px;
  padding:12px 24px;
  cursor:pointer;
  letter-spacing:2px;
}
#startBtn:active{background:rgba(92,74,30,0.3)}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cBg" width="360" height="640"></canvas>
  <canvas id="c" width="180" height="320"></canvas>
  <canvas id="c2" width="360" height="640"></canvas>
  <img id="headstock-img" src="headstock.png" alt="headstock">
  <button id="startBtn">TAP TO TUNE</button>
</div>
<script>
// ===== LAYERS =====
var cBg = document.getElementById('cBg');
var ctxBg = cBg.getContext('2d');
var c = document.getElementById('c');
var ctx = c.getContext('2d');
ctx.imageSmoothingEnabled = false;
var c2 = document.getElementById('c2');
var ctx2 = c2.getContext('2d');

// ===== NOTES & TUNING =====
var NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Ukulele standard tuning: G4=392, C4=261.63, E4=329.63, A4=440
var UKE_STRINGS = [
  { note: 'G', octave: 4, freq: 392.00 },
  { note: 'C', octave: 4, freq: 261.63 },
  { note: 'E', octave: 4, freq: 329.63 },
  { note: 'A', octave: 4, freq: 440.00 }
];
var UKE_NOTE_INDICES = [7, 0, 4, 9]; // G=7, C=0, E=4, A=9 in NOTE_NAMES

var frame = 0;

// VU meter params
var mx = 90, my = 130, oR = 65, iR = 26;
var aS = Math.PI * 0.78;
var a0 = Math.PI + Math.PI / 2 - aS / 2;
var noteArcR = oR + 18;
var S = 2;

var noteGlow = [];
for (var i = 0; i < 12; i++) noteGlow[i] = 0;

var NB = 24;
var barLevels = [];
var barTargets = [];
for (var i = 0; i < NB; i++) { barLevels[i] = 0; barTargets[i] = 0; }

// ===== AUDIO STATE =====
var audioCtx = null;
var analyser = null;
var audioBuffer = null;
var audioStarted = false;
var detectedFreq = 0;
var detectedNote = -1;
var detectedOctave = 4;
var detectedCents = 0;
var signalLevel = 0;
var needleTarget = 0;
var needlePos = 0;
var isUkeString = false; // true when detected note matches G/C/E/A

// ===== PITCH DETECTION =====
function autoCorrelate(buf, sampleRate) {
  // Check if there's enough signal
  var rms = 0;
  for (var i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / buf.length);
  if (rms < 0.01) return -1; // too quiet

  // Trim silence from edges
  var SIZE = buf.length;
  var r1 = 0, r2 = SIZE - 1;
  var threshold = 0.2;
  for (var i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buf[i]) < threshold) { r1 = i; break; }
  }
  for (var i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buf[SIZE - i]) < threshold) { r2 = SIZE - i; break; }
  }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  // Autocorrelation
  var c2 = new Array(SIZE).fill(0);
  for (var i = 0; i < SIZE; i++) {
    for (var j = 0; j < SIZE - i; j++) {
      c2[i] += buf[j] * buf[j + i];
    }
  }

  // Find first dip then first peak
  var d = 0;
  while (c2[d] > c2[d + 1]) {
    d++;
    if (d >= SIZE - 1) return -1;
  }

  var maxVal = -1, maxPos = -1;
  for (var i = d; i < SIZE; i++) {
    if (c2[i] > maxVal) {
      maxVal = c2[i];
      maxPos = i;
    }
  }

  var T0 = maxPos;

  // Parabolic interpolation for sub-sample accuracy
  if (T0 > 0 && T0 < SIZE - 1) {
    var x1 = c2[T0 - 1], x2 = c2[T0], x3 = c2[T0 + 1];
    var a = (x1 + x3 - 2 * x2) / 2;
    var b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);
  }

  return sampleRate / T0;
}

function freqToNote(freq) {
  // Returns { noteIndex (0-11), octave, cents }
  var noteNum = 12 * (Math.log(freq / 440) / Math.log(2));
  var rounded = Math.round(noteNum);
  var cents = Math.floor((noteNum - rounded) * 100);
  var idx = ((rounded % 12) + 12 + 9) % 12; // A=9 offset
  var octave = Math.floor((rounded + 69) / 12) - 1;
  // Correct: A4 = 440, noteNum=0, rounded=0, idx=9, octave=4
  return { noteIndex: idx, octave: octave, cents: cents };
}

// ===== START AUDIO =====
function startAudio() {
  document.getElementById('startBtn').style.display = 'none';
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    var source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    source.connect(analyser);
    audioBuffer = new Float32Array(analyser.fftSize);
    audioStarted = true;
  }).catch(function(err) {
    console.error('Mic error:', err);
    // Show button again
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').textContent = 'MIC DENIED';
  });
}

document.getElementById('startBtn').addEventListener('click', startAudio);

// ===== UPDATE =====
function update() {
  frame++;

  // Audio pitch detection
  if (audioStarted && analyser) {
    analyser.getFloatTimeDomainData(audioBuffer);

    // Signal level for bar animation
    var rms = 0;
    for (var i = 0; i < audioBuffer.length; i++) rms += audioBuffer[i] * audioBuffer[i];
    rms = Math.sqrt(rms / audioBuffer.length);
    signalLevel = Math.min(1, rms * 8);

    var freq = autoCorrelate(audioBuffer, audioCtx.sampleRate);

    if (freq > 60 && freq < 1000) {
      detectedFreq = freq;
      var info = freqToNote(freq);
      detectedNote = info.noteIndex;
      detectedOctave = info.octave;
      detectedCents = info.cents;

      // Needle: cents mapped to -1..1 range (±50 cents)
      needleTarget = Math.max(-1, Math.min(1, info.cents / 50));

      // Check if this is a uke string note
      isUkeString = false;
      for (var i = 0; i < UKE_NOTE_INDICES.length; i++) {
        if (detectedNote === UKE_NOTE_INDICES[i]) { isUkeString = true; break; }
      }
    } else {
      // No pitch detected — decay
      signalLevel *= 0.95;
      if (signalLevel < 0.01) {
        detectedNote = -1;
        detectedFreq = 0;
        needleTarget = 0;
      }
    }
  }

  // Smooth needle
  needlePos += (needleTarget - needlePos) * 0.12;

  // Note glow — light up detected note, extra bright for GCEA
  for (var i = 0; i < 12; i++) {
    var target = 0;
    if (i === detectedNote && signalLevel > 0.05) {
      target = Math.min(1, signalLevel * 2);
    }
    if (target > noteGlow[i]) {
      noteGlow[i] += (target - noteGlow[i]) * 0.25;
    } else {
      noteGlow[i] += (target - noteGlow[i]) * 0.08;
    }
  }

  // Bar levels driven by signal
  var centerBar = Math.floor(((needlePos + 1) / 2) * (NB - 1));
  for (var i = 0; i < NB; i++) {
    var d = Math.abs(i - centerBar);
    var energy = Math.max(0, 1 - d / 6) * signalLevel * (0.5 + Math.random() * 0.5);
    barTargets[i] = Math.max(barTargets[i] * 0.3, energy);
    if (barTargets[i] > barLevels[i]) {
      barLevels[i] += (barTargets[i] - barLevels[i]) * 0.3;
    } else {
      barLevels[i] += (barTargets[i] - barLevels[i]) * 0.07;
    }
    barLevels[i] = Math.max(0, barLevels[i]);
  }
}

// ========================================
// BACKGROUND NOTES (same as v3)
// ========================================
var SZ = 160;
var BG_NOTE_H = 160, BG_NOTE_GAP = 24, BG_NOTE_TOP = 56;
var BG_NOTE_W = Math.floor(BG_NOTE_H * 0.55);
var BG_LEFT_X = Math.floor(BG_NOTE_W / 2) + 4;
var BG_RIGHT_X = 360 - Math.floor(BG_NOTE_W / 2) - 4;
var BG_DOT_SIZE = 1.5, BG_DOT_STEP = 2.8;

function bgHeadSDF(px, py) {
  var hx = -SZ * 0.06, hy = SZ * 0.18;
  var angle = -0.35, co = Math.cos(angle), si = Math.sin(angle);
  var dx = px - hx, dy = py - hy;
  var rx = co * dx + si * dy, ry = -si * dx + co * dy;
  var a = SZ * 0.11, b = SZ * 0.08;
  return (rx * rx) / (a * a) + (ry * ry) / (b * b) - 1;
}
function bgStemSDF(px, py) {
  var sx = SZ * 0.04, syBot = SZ * 0.13, syTop = -SZ * 0.22, thick = SZ * 0.018;
  if (py < syTop || py > syBot) return 999;
  return Math.abs(px - sx) - thick;
}
function bgFlagSDF(px, py) {
  var fx = SZ * 0.04, fy = -SZ * 0.22, flagH = SZ * 0.18;
  var t = (py - fy) / flagH;
  if (t < 0 || t > 1) return 999;
  var curve = fx + Math.sin(t * Math.PI) * SZ * 0.12 * (1 - t * 0.3);
  var thick = SZ * 0.015 * (1 - t * 0.6);
  return Math.abs(px - curve) - thick;
}
function bgInside(px, py) {
  return Math.min(bgHeadSDF(px, py), bgStemSDF(px, py), bgFlagSDF(px, py)) < 0;
}

function precomputeMain() {
  var dots = [], hH = SZ * 0.5 + 6, hW = SZ * 0.4 + 6;
  for (var y = -hH; y <= hH; y += BG_DOT_STEP) {
    for (var x = -hW; x <= hW; x += BG_DOT_STEP) {
      if (bgInside(x, y)) {
        dots.push({ x: x, y: y, normY: (y + SZ * 0.25) / (SZ * 0.5) });
      }
    }
  }
  return dots;
}
function precomputeScatter() {
  var dots = [], hH = SZ * 0.5 + 12, hW = SZ * 0.4 + 12;
  for (var y = -hH; y <= hH; y += BG_DOT_STEP) {
    for (var x = -hW; x <= hW; x += BG_DOT_STEP) {
      if (!bgInside(x, y)) {
        var dH = bgHeadSDF(x, y), dS = bgStemSDF(x, y), dF = bgFlagSDF(x, y);
        var minD = Math.min(dH * 30, dS, dF);
        if (minD > 0 && minD < SZ * 0.06) {
          var hash = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
          var rand = hash - Math.floor(hash);
          if (rand > 0.85) dots.push({ x: x, y: y, rand: rand });
        }
      }
    }
  }
  return dots;
}

var bgMainDots = precomputeMain();
var bgScatDots = precomputeScatter();
var bgNotePos = [];
for (var i = 0; i < 3; i++) {
  var cy = BG_NOTE_TOP + BG_NOTE_H / 2 + i * (BG_NOTE_H + BG_NOTE_GAP);
  bgNotePos.push({ x: BG_LEFT_X, y: cy });
  bgNotePos.push({ x: BG_RIGHT_X, y: cy });
}

// Headstock placeholder
(function() {
  var el = document.getElementById('headstock-img');
  el.style.top = '50%';
  el.style.height = '50%';
  el.style.left = (30 / 180 * 100).toFixed(2) + '%';
  el.style.width = ((180 - 60) / 180 * 100).toFixed(2) + '%';
})();

// ========================================
// DRAW LAYER 0: BACKGROUND
// ========================================
function drawBackground(time) {
  ctxBg.fillStyle = '#0a0a0a';
  ctxBg.fillRect(0, 0, 360, 640);
  var OPACITY = 0.75;

  for (var n = 0; n < bgNotePos.length; n++) {
    var np = bgNotePos[n];
    for (var d = 0; d < bgMainDots.length; d++) {
      var dot = bgMainDots[d];
      var px = np.x + dot.x, py = np.y + dot.y;
      if (px < 0 || px >= 360 || py < 0 || py >= 640) continue;
      var nY = dot.normY;
      var pulse = 0.85 + 0.15 * Math.sin(time * 0.002 + px * 0.005 + py * 0.004);
      var r = Math.floor((230 + 25 * nY) * pulse);
      var g = Math.floor((230 + 20 * (1 - nY)) * pulse);
      var b = Math.floor((235 + 15 * nY) * pulse);
      ctxBg.globalAlpha = (0.7 + 0.3 * pulse) * OPACITY;
      ctxBg.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      ctxBg.beginPath();
      ctxBg.arc(px, py, BG_DOT_SIZE * 0.5, 0, Math.PI * 2);
      ctxBg.fill();
    }
    for (var d = 0; d < bgScatDots.length; d++) {
      var dot = bgScatDots[d];
      var px = np.x + dot.x, py = np.y + dot.y;
      if (px < 0 || px >= 360 || py < 0 || py >= 640) continue;
      var thr = 0.88 + 0.08 * Math.sin(time * 0.001 + dot.rand * 6.28);
      if (dot.rand > thr) {
        ctxBg.globalAlpha = (0.1 + 0.15 * dot.rand) * OPACITY;
        ctxBg.fillStyle = 'rgb(200,200,210)';
        ctxBg.beginPath();
        ctxBg.arc(px, py, BG_DOT_SIZE * 0.35, 0, Math.PI * 2);
        ctxBg.fill();
      }
    }
    var glowX = np.x + (-SZ * 0.06), glowY = np.y + (SZ * 0.18);
    var grd = ctxBg.createRadialGradient(glowX, glowY, 0, glowX, glowY, SZ * 0.18);
    grd.addColorStop(0, 'rgba(255,255,255,0.025)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctxBg.globalAlpha = 1;
    ctxBg.fillStyle = grd;
    ctxBg.fillRect(np.x - SZ * 0.5, np.y - SZ * 0.5, SZ, SZ);
  }
  ctxBg.globalAlpha = 1;
}

// ========================================
// DRAW LAYER 1: PIXEL METER
// ========================================
function drawPixel() {
  ctx.clearRect(0, 0, 180, 320);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(46, 0, 88, 320);

  // Outer arc
  for (var i = 0; i <= 48; i++) {
    var a = a0 + (i / 48) * aS;
    ctx.fillStyle = '#5C4A1E';
    ctx.fillRect(mx + Math.cos(a) * (oR + 2) | 0, my + Math.sin(a) * (oR + 2) | 0, 1, 1);
  }
  // Inner arc
  for (var i = 0; i <= 32; i++) {
    var a = a0 + (i / 32) * aS;
    ctx.fillStyle = '#3D2E0A';
    ctx.fillRect(mx + Math.cos(a) * (iR - 1) | 0, my + Math.sin(a) * (iR - 1) | 0, 1, 1);
  }
  // Side lines
  var sides = [a0, a0 + aS];
  for (var s = 0; s < 2; s++) {
    var a = sides[s];
    var co = Math.cos(a), si = Math.sin(a);
    for (var r = iR - 1; r <= oR + 2; r++) {
      ctx.fillStyle = '#3D2E0A';
      ctx.fillRect(mx + co * r | 0, my + si * r | 0, 1, 1);
    }
  }
  // Tick marks
  for (var i = 0; i <= 10; i++) {
    var a = a0 + (i / 10) * aS;
    var co = Math.cos(a), si = Math.sin(a);
    var len = (i % 5 === 0) ? 5 : 3;
    ctx.fillStyle = (i === 5) ? '#5C4A1E' : '#3D2E0A';
    for (var r = 0; r < len; r++) {
      ctx.fillRect(mx + co * (oR + 3 + r) | 0, my + si * (oR + 3 + r) | 0, 1, 1);
    }
  }
  // Radial bars
  for (var i = 0; i < NB; i++) {
    var a = a0 + (i / (NB - 1)) * aS;
    var co = Math.cos(a), si = Math.sin(a);
    var ml = oR - iR;
    var h = ml * Math.min(1, barLevels[i]);
    for (var r = 0; r < h; r++) {
      var t = r / ml;
      if (t > 0.6) ctx.fillStyle = '#FF8C1A';
      else if (t > 0.3) ctx.fillStyle = '#E8750A';
      else ctx.fillStyle = '#6b3805';
      ctx.fillRect(mx + co * (iR + r) | 0, my + si * (iR + r) | 0, 1, 1);
    }
  }
  // Pivot
  ctx.fillStyle = '#5C4A1E';
  ctx.fillRect(mx - 1, my - 1, 3, 3);
  // Needle
  var na = a0 + ((needlePos + 1) / 2) * aS;
  var nc = Math.cos(na), ns = Math.sin(na);
  ctx.globalAlpha = 0.12;
  for (var r = 0; r < oR + 1; r++) {
    ctx.fillStyle = '#E83030';
    ctx.fillRect(mx + nc * r | 0, my + ns * r | 0, 2, 2);
  }
  ctx.globalAlpha = 1;
  for (var r = 3; r < oR + 1; r++) {
    ctx.fillStyle = '#E83030';
    ctx.fillRect(mx + nc * r | 0, my + ns * r | 0, 1, 1);
  }
  ctx.fillStyle = '#FF5050';
  ctx.fillRect(mx + nc * (oR + 1) | 0, my + ns * (oR + 1) | 0, 2, 2);
  // Corner brackets
  ctx.fillStyle = '#3D2E0A';
  for (var i = 0; i < 8; i++) { ctx.fillRect(3, 3 + i, 1, 1); ctx.fillRect(3 + i, 3, 1, 1); }
  for (var i = 0; i < 8; i++) { ctx.fillRect(176, 3 + i, 1, 1); ctx.fillRect(176 - i, 3, 1, 1); }
  for (var i = 0; i < 8; i++) { ctx.fillRect(3, 316 - i, 1, 1); ctx.fillRect(3 + i, 316, 1, 1); }
  for (var i = 0; i < 8; i++) { ctx.fillRect(176, 316 - i, 1, 1); ctx.fillRect(176 - i, 316, 1, 1); }
  // Status
  ctx.fillStyle = '#3D2E0A';
  ctx.font = "3px 'Courier New',monospace";
  ctx.textAlign = 'center';
  ctx.fillText('PIXEL UKE TUNER v1.0', mx, 310);
}

// ========================================
// DRAW LAYER 2: HI-RES TEXT
// ========================================
function drawHiRes() {
  ctx2.clearRect(0, 0, 360, 640);

  var hmx = mx * S, hmy = my * S;
  var hNoteR = noteArcR * S;

  var isInTune = detectedNote >= 0 && Math.abs(detectedCents) < 5 && signalLevel > 0.05;

  // Arc note names
  for (var i = 0; i < 12; i++) {
    var t = i / 11;
    var angle = a0 + t * aS;
    var nx = hmx + Math.cos(angle) * hNoteR;
    var ny = hmy + Math.sin(angle) * hNoteR;

    var glow = noteGlow[i];
    var size = 8 + glow * 6;

    // Check if this note is a uke string
    var isUke = false;
    for (var u = 0; u < UKE_NOTE_INDICES.length; u++) {
      if (i === UKE_NOTE_INDICES[u]) { isUke = true; break; }
    }

    var r, g, b;
    if (i === detectedNote && isInTune && isUke) {
      // GCEA in tune — bright green
      r = Math.floor(57 + 57 * glow);
      g = 255;
      b = 20;
    } else if (glow > 0.8) {
      r = Math.floor(57 + 57 * (1 - glow)); g = 255; b = 20;
    } else if (glow > 0.3) {
      r = Math.floor(100 + 140 * glow); g = Math.floor(80 + 150 * glow); b = Math.floor(30 + 30 * glow);
    } else {
      // Dim state: GCEA notes slightly brighter than others
      if (isUke) {
        r = Math.floor(80 + 40 * glow); g = Math.floor(65 + 30 * glow); b = Math.floor(15 + 20 * glow);
      } else {
        r = Math.floor(61 + 40 * glow); g = Math.floor(46 + 30 * glow); b = Math.floor(10 + 20 * glow);
      }
    }

    ctx2.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx2.font = 'bold ' + Math.floor(size) + "px 'Courier New',monospace";
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText(NOTE_NAMES[i], nx, ny);

    var octSize = Math.max(5, Math.floor(size * 0.5));
    ctx2.font = 'bold ' + octSize + "px 'Courier New',monospace";
    ctx2.globalAlpha = 0.35 + glow * 0.65;
    ctx2.fillText('4', nx + size * 0.45 + 1, ny + size * 0.3);
    ctx2.globalAlpha = 1;
  }

  // Current detected note (big, center top)
  var dispNote = detectedNote >= 0 ? NOTE_NAMES[detectedNote] : '--';
  var dispOctave = detectedNote >= 0 ? '' + detectedOctave : '';
  var isClose = detectedNote >= 0 && Math.abs(detectedCents) < 5;

  var ox = 0, oy = 0;
  if (!isClose && detectedNote >= 0 && Math.abs(detectedCents) > 15) {
    ox = (Math.random() - 0.5) * 2;
    oy = (Math.random() - 0.5) * 2;
  }

  ctx2.fillStyle = isClose ? '#39FF14' : '#f0e6d0';
  ctx2.font = "bold 30px 'Courier New',monospace";
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(dispNote, hmx - 6 + ox, 42 + oy);

  if (dispOctave) {
    ctx2.font = "bold 16px 'Courier New',monospace";
    ctx2.globalAlpha = 0.7;
    ctx2.fillText(dispOctave, hmx + 16 + ox, 48 + oy);
    ctx2.globalAlpha = 1;
  }

  // Cents display
  if (detectedNote >= 0) {
    var cStr = detectedCents > 0 ? '+' + detectedCents + '¢' : detectedCents + '¢';
    ctx2.fillStyle = Math.abs(detectedCents) < 5 ? '#39FF14' : Math.abs(detectedCents) < 20 ? '#FDCD60' : '#E83030';
    ctx2.font = "bold 12px 'Courier New',monospace";
    ctx2.fillText(cStr, hmx, 70);

    // Frequency
    ctx2.fillStyle = '#5C4A1E';
    ctx2.font = "9px 'Courier New',monospace";
    ctx2.fillText(detectedFreq.toFixed(1) + ' Hz', hmx, 86);
  } else {
    ctx2.fillStyle = '#3D2E0A';
    ctx2.font = "9px 'Courier New',monospace";
    ctx2.fillText('listening...', hmx, 78);
  }

  // IN TUNE label
  if (isClose && isUkeString) {
    ctx2.fillStyle = '#39FF14';
    ctx2.font = "bold 11px 'Courier New',monospace";
    ctx2.fillText('IN TUNE', hmx, 102);
  }

  // ±50, 0 labels
  ctx2.fillStyle = '#5C4A1E';
  ctx2.font = "bold 9px 'Courier New',monospace";
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  var lR = (oR + 11) * S;
  ctx2.fillText('-50', hmx + Math.cos(a0) * lR, hmy + Math.sin(a0) * lR);
  ctx2.fillText('+50', hmx + Math.cos(a0 + aS) * lR, hmy + Math.sin(a0 + aS) * lR);
  ctx2.fillText('0', hmx + Math.cos(a0 + aS / 2) * lR, hmy + Math.sin(a0 + aS / 2) * lR);

  // Headstock image is handled by the <img> tag
}

// ========================================
// MAIN LOOP
// ========================================
function loop() {
  update();
  drawBackground(frame * 16);
  drawPixel();
  drawHiRes();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
